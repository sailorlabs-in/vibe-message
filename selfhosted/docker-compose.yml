version: '3.8'

services:
  vibe-message-selfhosted:
    image: sailorlabs/vibe-message-selfhosted:latest
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    container_name: vibe-selfhosted-server
    ports:
      - "5001:${PORT:-5000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-5000}
      - IS_SELF_HOSTED=true
      - ENTERPRISE_KEY=${ENTERPRISE_KEY}
      
      # Use host.docker.internal to contact the main validation server
      - VIBE_MAIN_SERVER_URL=${VIBE_MAIN_SERVER_URL:-https://vibemessage.sailorlabs.in/api}
      
      # Database connection (falls back to local container name if empty)
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres_secret123@postgres-selfhosted:5432/vibe_message}
      
      # Caching connection (falls back to local container name if empty)
      - REDIS_HOST=${REDIS_HOST:-redis-selfhosted}
      - REDIS_PORT=${REDIS_PORT:-6379}
      
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-key-in-production}
      
      # Super Admin (created on initial launch)
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-vibemessageadmin@sailorlabs.in}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:-VibeMessageAdmin@123}
      - SUPER_ADMIN_NAME=${SUPER_ADMIN_NAME:-Super Admin}
      
      # Subject/contact info for auto-generated VAPID keys
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@example.com}
      
      - ALLOWED_ORIGINS=*
    depends_on:
      postgres-selfhosted:
        condition: service_healthy
      redis-selfhosted:
        condition: service_started
    restart: always

  postgres-selfhosted:
    image: postgres:16-alpine
    container_name: vibe-postgres-selfhosted
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secret123
      - POSTGRES_DB=vibe_message
    ports:
      - "5433:5432"
    volumes:
      - postgres_selfhosted_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibe_message"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis-selfhosted:
    image: redis:7-alpine
    container_name: vibe-redis-selfhosted
    ports:
      - "6380:6379"
    volumes:
      - redis_selfhosted_data:/data
    restart: always

volumes:
  postgres_selfhosted_data:
  redis_selfhosted_data:

version: '3.8'

services:
  vibe-message-selfhosted:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    container_name: vibe-selfhosted-server
    ports:
      - "5001:${PORT:-5000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-5000}
      - IS_SELF_HOSTED=true
      - ENTERPRISE_KEY=${ENTERPRISE_KEY}
      
      # Use host.docker.internal to contact the main validation server running on host port 3200
      - VIBE_MAIN_SERVER_URL=${VIBE_MAIN_SERVER_URL}
      
      # Database connection (internal PostgreSQL container)
      - DATABASE_URL=${DATABASE_URL}
      
      # Caching connection (internal Redis container)
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-key-in-production}
      
      # Super Admin (created on initial launch)
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD}
      - SUPER_ADMIN_NAME=${SUPER_ADMIN_NAME:-Super Admin}
      
      # VAPID keys (automatically generated by backend since they are omitted)
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@example.com}
      
      - ALLOWED_ORIGINS=*
    depends_on:
      postgres-selfhosted:
        condition: service_healthy
      redis-selfhosted:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  postgres-selfhosted:
    image: postgres:16-alpine
    container_name: vibe-postgres-selfhosted
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secret123
      - POSTGRES_DB=vibe_message
    ports:
      - "5433:5432"
    volumes:
      - postgres_selfhosted_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibe_message"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis-selfhosted:
    image: redis:7-alpine
    container_name: vibe-redis-selfhosted
    ports:
      - "6380:6379"
    volumes:
      - redis_selfhosted_data:/data
    restart: always

volumes:
  postgres_selfhosted_data:
  redis_selfhosted_data:
